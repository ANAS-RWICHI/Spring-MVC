<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <title>newProduct</title>
</head>
<body>
<div layout:fragment="content" class="p-3">
  <form th:action="@{/saveProduct}" method="post">
    <div class="form-group">
      <label>Product Name</label>
      <input type="text" class="form-control" name="name" placeholder="Enter Product Name" th:value="${product.name}">
      <span class="text-danger" th:errors="${product.name}"></span>
    </div>
    <div class="form-group">
      <label>Product price</label>
      <input type="number" class="form-control" name="price" placeholder="Enter Product price" th:value="${product.price}">
      <span class="text-danger" th:errors="${product.price}"></span>
    </div>
    <div class="form-group">
      <label>Product quantity</label>
      <input type="number" class="form-control" name="quantity" placeholder="Enter Product quantity" th:value="${product.quantity}">
      <span class="text-danger" th:errors="${product.quantity}"></span>
    </div>

    <a class="btn btn-secondary" th:href="@{/index}">Cancel</a>
    <button type="submit" class="btn btn-primary">Submit</button>
  </form>
</div>
</body>
</html>
