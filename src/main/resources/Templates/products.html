<!DOCTYPE html>
<html lang="en"
      xmlns:th="http://www.thymeleaf.org"
      xmlns:layout="http://www.ultraq.net.nz/thymeleaf/layout"
      xmlns:sec="http://www.thymeleaf.org/extras/spring-security"
      layout:decorate="~{layout}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1">
    <title>Product Inventory</title>
</head>
<body>

<div class="container" layout:fragment="content">
    <h1>Product Inventory</h1>
    <table class="table table-striped">
        <thead>
        <tr>
            <th>ID</th>
            <th>Name</th>
            <th>Price</th>
            <th>Quantity</th>
            <th sec:authorize="hasRole('ADMIN')">Actions</th>
            <th sec:authorize="hasRole('ADMIN')"><a class="btn btn-primary" th:href="@{/addProduct}">new Product </a></th>
        </tr>
        </thead>
        <tbody>
        <tr th:each="product : ${productsList}">
            <td th:text="${product.id}"></td>
            <td th:text="${product.name}"></td>
            <td th:text="${product.price}"></td>
            <td th:text="${product.quantity}"></td>
            <td sec:authorize="hasRole('ADMIN')">
                <a class="btn btn-primary btn-sm"
                   th:href="@{/edit(id=${product.id})}">Edit</a>
                <form th:action="@{/delete(id=${product.id})}"  method="post">
                    <button class="btn btn-danger btn-sm" type="submit" onclick="return confirm('Are you sure you want to delete this product?')">Delete</button>
                </form>
            </td>
        </tr>
        </tbody>
    </table>
</div>

</body>
</html>
